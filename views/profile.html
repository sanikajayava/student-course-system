<!DOCTYPE html>
<html>
<head>
<title>Profile</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="sidebar">
    <h3 class="text-center mb-4">Menu</h3>
    <a href="/home">Home</a>
    <a href="/courses">Courses</a>
    <a href="/mycourses">My Courses</a>
    <a href="/profile">Profile</a>
    <a href="/" onclick="localStorage.clear()">Logout</a>
</div>

<div class="main">
    <h2>Student Profile</h2>
    <div class="card p-4">
        <div class="text-center mb-3">
            <i class="bi bi-person-circle action-icon"></i>
        </div>
        <p><strong>Email:</strong> <span id="email"></span></p>
        <p><strong>Name:</strong> <span id="name">Student</span></p>
        <p><strong>Phone:</strong> <span id="phone">Not provided</span></p>
    </div>
</div>

<script>
const email = localStorage.getItem("studentEmail");
document.getElementById("email").textContent = email || "Not logged in";
if(!email) {
    window.location.href = "/";
}
// Note: For full profile, we might need to fetch student data from server, but for now, just email.
</script>

</body>
</html>
