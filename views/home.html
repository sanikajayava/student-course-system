<!DOCTYPE html>
<html>
<head>
<title>Home</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="sidebar">
    <h3 class="text-center mb-4">Menu</h3>
    <a href="/home">Home</a>
    <a href="/courses">Courses</a>
    <a href="/mycourses">My Courses</a>
    <a href="/profile">Profile</a>
    <a href="/" onclick="localStorage.clear()">Logout</a>
</div>

<div class="main">
    <h2>Welcome to Student Course System</h2>
    <div class="row">
        <div class="col-md-4 mb-3">
            <div class="card action-card">
                <div class="card-body">
                    <i class="bi bi-book action-icon"></i>
                    <h5 class="card-title">Browse Courses</h5>
                    <p>Explore available courses and enroll.</p>
                    <a href="/courses" class="btn action-btn">Go to Courses</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card action-card">
                <div class="card-body">
                    <i class="bi bi-list-check action-icon"></i>
                    <h5 class="card-title">My Courses</h5>
                    <p>View and manage your enrolled courses.</p>
                    <a href="/mycourses" class="btn action-btn">View My Courses</a>
                </div>
            </div>
        </div>
        <div class="col-md-4 mb-3">
            <div class="card action-card">
                <div class="card-body">
                    <i class="bi bi-person action-icon"></i>
                    <h5 class="card-title">Profile</h5>
                    <p>Update your profile information.</p>
                    <a href="/profile" class="btn action-btn">Go to Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
if(!localStorage.getItem("studentEmail")) {
    window.location.href = "/";
}
</script>

</body>
</html>
