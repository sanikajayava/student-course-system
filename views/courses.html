<!DOCTYPE html>
<html>
<head>
<title>Courses</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="sidebar">
    <h3 class="text-center mb-4">Menu</h3>
    <a href="/home">Home</a>
    <a href="/courses">Courses</a>
    <a href="/mycourses">My Courses</a>
    <a href="/profile">Profile</a>
    <a href="/" onclick="localStorage.clear()">Logout</a>
</div>

<div class="main">
    <h2>Available Courses</h2>
    <div class="card p-4">
        <form action="/enroll" method="POST">
            <input type="hidden" name="email" id="email">
            <div class="mb-3">
                <label for="course" class="form-label">Select Course</label>
                <select name="course" class="form-control" id="course">
                    <option value="CS101">CS101 - Introduction to Computer Science</option>
                    <option value="CC305">CC305 - Cloud Computing</option>
                    <option value="ML201">ML201 - Machine Learning</option>
                    <option value="DS202">DS202 - Data Science</option>
                    <option value="OS301">OS301 - Operating Systems</option>
                    <option value="CN302">CN302 - Computer Networks</option>
                </select>
            </div>
            <button class="btn action-btn">Enroll</button>
        </form>
    </div>
</div>

<script>
document.getElementById("email").value = localStorage.getItem("studentEmail");
if(!localStorage.getItem("studentEmail")) {
    window.location.href = "/";
}
</script>

</body>
</html>
