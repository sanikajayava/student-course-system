<!DOCTYPE html>
<html>
<head>
<title>My Courses</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="/style.css">
</head>

<body>

<div class="sidebar">
    <h3 class="text-center mb-4">Menu</h3>
    <a href="/home">Home</a>
    <a href="/courses">Courses</a>
    <a href="/mycourses">My Courses</a>
    <a href="/profile">Profile</a>
    <a href="/" onclick="localStorage.clear()">Logout</a>
</div>

<div class="main">
    <h2>My Enrolled Courses</h2>
    <div id="courses-container" class="row"></div>
</div>

<script>
const email = localStorage.getItem("studentEmail");
if(!email) {
    window.location.href = "/";
} else {
    fetch(`/mycourses?email=${email}`)
    .then(res => res.json())
    .then(courses => {
        const container = document.getElementById("courses-container");
        if(courses.length === 0) {
            container.innerHTML = "<p>No courses enrolled yet.</p>";
        } else {
            courses.forEach(course => {
                const col = document.createElement("div");
                col.className = "col-md-4 mb-3";
                col.innerHTML = `
                    <div class="card action-card">
                        <div class="card-body">
                            <i class="bi bi-book action-icon"></i>
                            <h5 class="card-title">${course}</h5>
                            <button class="btn action-btn" onclick="dropCourse('${course}')">Drop Course</button>
                        </div>
                    </div>
                `;
                container.appendChild(col);
            });
        }
    });
}

function dropCourse(course) {
    fetch("/dropcourse", {
        method: "POST",
        headers: {"Content-Type": "application/x-www-form-urlencoded"},
        body: `email=${email}&course=${course}`
    }).then(() => location.reload());
}
</script>

</body>
</html>
